{{- if .Values.clickhouse.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "alphatrion.fullname" . }}-clickhouse-migration
  labels:
    {{- include "alphatrion.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse-migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": {{ .Values.clickhouse.migrations.hookWeight | quote }}
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "alphatrion.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: clickhouse-migration
    spec:
      restartPolicy: Never
      containers:
      - name: clickhouse-migration
        image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.server.image.pullPolicy }}
        command:
        - sh
        - -c
        - |
          set -e
          echo "=========================================="
          echo "ClickHouse Schema Migrations"
          echo "=========================================="
          echo ""
          echo "Database: {{ .Values.clickhouse.database }}"
          echo ""

          # Run migrations using the Python CLI
          echo "Running migrations..."
          python -m migrations.clickhouse.cli migrate

          echo ""
          echo "=========================================="
          echo "✓ Migration completed successfully!"
          echo "=========================================="
        env:
        - name: ALPHATRION_CLICKHOUSE_URL
          value: "{{ .Values.clickhouse.host }}:{{ .Values.clickhouse.port }}"
        - name: ALPHATRION_CLICKHOUSE_DATABASE
          value: "{{ .Values.clickhouse.database }}"
        - name: ALPHATRION_CLICKHOUSE_USERNAME
          value: "{{ .Values.clickhouse.username }}"
        - name: ALPHATRION_CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "alphatrion.clickhouse.secretName" . }}
              key: {{ include "alphatrion.clickhouse.secretKey" . }}
        {{- if .Values.clickhouse.clusterName }}
        - name: ALPHATRION_CLICKHOUSE_CLUSTER_NAME
          value: "{{ .Values.clickhouse.clusterName }}"
        {{- end }}
{{- end }}
