{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "alphatrion.fullname" . }}
  labels:
    {{- include "alphatrion.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          # API routes go to backend server
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "alphatrion.server.fullname" $ }}
                port:
                  number: {{ $.Values.server.service.port }}
          # GraphQL routes go to backend server
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: {{ include "alphatrion.server.fullname" $ }}
                port:
                  number: {{ $.Values.server.service.port }}
          # Everything else (/, /static/*, SPA routes) goes to dashboard (static files)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "alphatrion.dashboard.fullname" $ }}
                port:
                  number: {{ $.Values.dashboard.service.port }}
    {{- end }}
{{- end }}
